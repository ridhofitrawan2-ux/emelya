<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 Melya For Meeeeeeeeeeeeee aaaaaaaaaaaaaaaaaaaaaaa 🐻</title>
    
    <!-- Import Font Lucu -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE VARIABLES & RESET
           ========================================= */
        :root {
            /* Palette Pastel Melya */
            --melya-pink: #ffafbd;
            --melya-pink-dark: #ffc3a0;
            --melya-blue: #a1c4fd;
            --melya-mint: #c2e9fb;
            --melya-cream: #fdfbf7;
            --text-color: #554d56;
            --card-shadow: 0 10px 25px rgba(255, 175, 189, 0.3);
            --font-heading: 'Fredoka One', cursive;
            --font-body: 'Quicksand', sans-serif;
            --font-cute: 'Patrick Hand', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Mencegah seleksi teks biar experience-nya seperti aplikasi native */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: var(--font-body);
            /* Background gradasi yang smooth */
            background-image: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
            height: 100vh;
            overflow: hidden; /* Scroll diatur di dalam container */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            position: relative;
        }

        /* =========================================
           2. APLIKASI CONTAINER (PHONE VIEW)
           ========================================= */
        .app-frame {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.15),
                0 0 0 8px rgba(255,255,255,0.4); /* Border halus */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        /* =========================================
           3. NAVIGASI (DOTS)
           ========================================= */
        .nav-dots {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #eee;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .dot.active {
            background: var(--melya-pink-dark);
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 10px var(--melya-pink);
        }

        /* =========================================
           4. HALAMAN (PAGES SYSTEM)
           ========================================= */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 25px 20px;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8) translateY(50px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow-y: auto; /* Bisa di-scroll */
            background: linear-gradient(to bottom, #fff 0%, #fff0f5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
            z-index: 10;
        }

        /* Scrollbar imut */
        .page::-webkit-scrollbar {
            width: 6px;
        }
        .page::-webkit-scrollbar-track {
            background: transparent;
        }
        .page::-webkit-scrollbar-thumb {
            background: var(--melya-pink);
            border-radius: 10px;
        }

        /* =========================================
           5. KOMPONEN UI (BUTTONS, CARDS)
           ========================================= */
        /* Tombol Utama */
        .btn-main {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
            transition: transform 0.2s;
            margin-top: auto; /* Dorong ke bawah */
            width: 80%;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        /* =========================================
           6. HALAMAN 1: COVER
           ========================================= */
        .hero-emoji {
            font-size: 5rem;
            margin-top: 40px;
            margin-bottom: 20px;
            animation: floatHero 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(255, 154, 158, 0.3));
        }

        @keyframes floatHero {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .title-hero {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: #ff6b6b;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .subtitle-hero {
            font-size: 1rem;
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* =========================================
           7. HALAMAN 2: LIST 1500 BARIS
           ========================================= */
        .sticky-header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 50;
            text-align: center;
            font-family: var(--font-heading);
            color: var(--melya-pink-dark);
            border: 2px dashed var(--melya-pink);
        }

        .log-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-bottom: 80px;
        }

        .log-item {
            font-family: var(--font-cute);
            font-size: 1.15rem;
            color: #6a6a6a;
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
            cursor: default;
        }

        .log-item:hover {
            background: #fff0f5;
            color: #ff6b6b;
            padding-left: 18px; /* Efek geser sedikit */
            transform: scale(1.01);
        }

        .name-highlight {
            color: #ff6b6b;
            font-weight: bold;
            font-family: var(--font-heading);
            font-size: 1.1em;
        }

        /* Tombol rahasia di bawah */
        .secret-btn {
            width: 100%;
            padding: 20px;
            background: #4a4a4a;
            color: #fff;
            border: none;
            border-radius: 15px;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
            margin-top: 20px;
        }

        .secret-btn.show {
            opacity: 1;
            transform: translateY(0);
            background: linear-gradient(to right, #ff6b6b, #ff8e53);
        }

        /* =========================================
           8. HALAMAN 3: SURAT CINTA (SALTING)
           ========================================= */
        .letter-paper {
            background: #fff;
            width: 100%;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            border: 1px solid #ffe0e0;
            margin-top: 20px;
        }

        .paper-clip {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: #ff6b6b;
            background: #fff;
            padding: 0 10px;
        }

        .letter-content {
            font-family: var(--font-cute);
            font-size: 1.25rem;
            line-height: 1.8;
            color: #444;
            text-align: left;
            white-space: pre-line; /* Biar enter terbaca */
        }

        /* =========================================
           9. MASCOT MR. BEAR
           ========================================= */
        .mascot-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            pointer-events: none; /* Supaya klik tembus ke belakang */
        }

        .bubble {
            background: #fff;
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-family: var(--font-cute);
            font-size: 1rem;
            color: #333;
            max-width: 220px;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(10px) scale(0.8);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bubble.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .bear-avatar {
            font-size: 4rem;
            cursor: pointer;
            pointer-events: auto; /* Avatar bisa diklik */
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.15));
            animation: breathe 3s infinite ease-in-out;
            transition: transform 0.2s;
        }
        
        .bear-avatar:active {
            transform: scale(0.9);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Efek Floating Hearts saat klik */
        .heart-pop {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            z-index: 999;
            animation: flyUp 1s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- FRAME UTAMA -->
    <div class="app-frame">
        
        <!-- NAVIGASI -->

    <script>

            "begadang", "nonton drakor", "nonton anime", "nonton film", "netflix party",

            "vlogger", "youtuber", "selebgram", "tiktokers", "content creator"
        ];

        // --- 3. BENDA / OBJEK (Objects) ---
        const objects = [
            "sepatu hak tinggi", "sandal jepit", "sepatu lari", "kaos kaki", "rok mini",
            "rok span", "hot pants", "legging", "tight jeans", "celana kulot",
            "piyama", "daster", "mukena", "gamis syar'i", "kerudung cantik",
            "hijab segi empat", "pashmina", "turban", "headband", "bandana",
            "topi beanie", "kacamata hitam", "kacamata minus", "softlens", "maskara",
            "eyeliner", "eyebrow pencil", "lipstik matte", "lip cream", "lip balm",
            "bedak tabur", "foundation", "concealer", "primer", "palette eyeshadow",
            "blush on", "highlighter", "kuas makeup", "sponge beauty blender", "tisu wajah",
            "sabun mandi", "shampoo herbal", "conditioner", "hair vitamin", "serum wajah",
            "sunblock", "pelembab harian", "masker wajah", "toner wajah", "handbody lotion",
            "parfum original", "minyak wangi", "essence", "kapur barus", "baju gantung",
            "hanger", "jemuran", "setrika", "mesin cuci", "timba air",
            "gayung air", "sapu lidi", "pengki", "kain pel", "lap tangan",
            "obat nyamuk", "raket nyamuk", "kantong sampah", "deterjen bubuk", "deterjen cair",
            "pewangi pakaian", "sabun cuci piring", "spons cuci", "kain serbet", "aluminum foil",
            "toples makanan", "wadah penyimpanan", "kulkas 2 pintu", "freezer", "dispenser",
            "kompor gas", "kompor listrik", "oven listrik", "microwave", "blender portable",
            "mixer kue", "timbangan digital", "loyang kue", "cetakan donat", "pisau dapur",
            "talenan", "serokan nasi", "sendok makan", "garpu makan", "piring makan",
            "botol minum", "tumbler", "tupperware", "vitamin", "suplemen"
        ];

        // --- 4. TEMPLATE KALIMAT (Sentence Templates) ---
        const templates = [
            `${targetName} itu {adj}.`,
            `Mr. Bear suka banget kalo ${targetName} lagi {act}.`,
            `${targetName} punya {obj} yang lucu.`,
            `Jangan lupa ya ${targetName}, kamu itu {adj}.`,

            `Kalo ${targetName} {act}, Mr. Bear senang.`,
            `Tetap semangat ya ${targetName}.`,
            `${targetName} adalah anugerah terindah.`,
            `Cintailah dirimu sendiri ya ${targetName}, karena kamu {adj}.`,
            `Mr. Bear menemani ${targetName} yang sedang {act}.`,
            `Kelebihan ${targetName}: {adj}, {adj}, dan {adj}.`,
            `Gak ada yang bisa ngalahin ${targetName}.`,
            `Melya, jangan lupa tersenyum! 🙂`,
            `${targetName} itu kebetulan terindah.`

        // =========================================
        // LOGIC: GENERATE 1500 LINES
        // =========================================

        const logContainer = document.getElementById('logListContainer');
        const btnSecret = document.getElementById('btnSecret');
        let isLoaded = false;

        function generateContent() {
            if (isLoaded) return; // Biar nggak double load
            isLoaded = true;

            const fragment = document.createDocumentFragment();
            const totalLines = 1500;

            for (let i = 0; i < totalLines; i++) {
                const div = document.createElement('div');
                div.className = 'log-item';
                
                // Pilih template random
                let text = templates[Math.floor(Math.random() * templates.length)];
                
                // Replace placeholder
                text = text.replace("{adj}", adjectives[Math.floor(Math.random() * adjectives.length)]);
                text = text.replace("{act}", activities[Math.floor(Math.random() * activities.length)]);
                text = text.replace("{obj}", objects[Math.floor(Math.random() * objects.length)]);
                
                // Tambah nomor
                const numSpan = document.createElement('span');
                numSpan.style.marginRight = "10px";
                numSpan.style.color = "#ccc";
                numSpan.style.fontSize = "0.9em";
                numSpan.innerText = `${i + 1}.`;

                div.appendChild(numSpan);
                
                // Masukkan text dan highlight nama
                const contentSpan = document.createElement('span');
                contentSpan.innerHTML = text.replace(targetName, `<span class="name-highlight">${targetName}</span>`);
                
                div.appendChild(contentSpan);
                fragment.appendChild(div);
            }

            // Render sekaligus biar cepat (1500 items cukup ringan untuk modern browser)
            logContainer.appendChild(fragment);

            // Reveal tombol setelah render selesai
            setTimeout(() => {
                btnSecret.classList.add('show');
                logContainer.scrollTop = logContainer.scrollHeight; // Auto scroll ke bawah dikit
            }, 500);
        }

        // =========================================
        // LOGIC: NAVIGASI & INTERAKSI
        // =========================================

        function goToPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`p${pageNum}`).classList.add('active');
            
            // Update dots
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', idx + 1 === pageNum);
            });

            // Logic khusus per halaman
            const bubble = document.getElementById('bearMsg');
            
            if (pageNum === 2) {
                bubble.innerText = "Scroll ke bawah terus ya Melya! Banyak banget!";
                generateContent();
            } else if (pageNum === 3) {
                bubble.innerText = "Ini bagian terakhir... baca pelan-pelan ya.";
                typeWriterEffect();
            } else {
                bubble.innerText = "Hai Melya! Klik aku ya!";
            }
        }

        // =========================================
        // LOGIC: SURAT TERAKHIR (TYPEWRITER)
        // =========================================

        const finalMessage = `

        function typeWriterEffect() {
            const element = document.getElementById('finalLetter');
            element.innerHTML = "";
            let i = 0;
            const speed = 30; // Kecepatan ngetik

            function type() {
                if (i < finalMessage.length) {
                    element.innerHTML += finalMessage.charAt(i) === '\n' ? '<br>' : finalMessage.charAt(i);
                    element.scrollTop = element.scrollHeight; // Auto scroll surat
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // =========================================
        // INTERAKSI MASCOT
        // =========================================

        function pokeBear() {
            const phrases = [
                "Melya paling top!",
                "Melya cantik ya?",
                "Mr. Bear lho!",
                "Jangan bosan ya Melya...",
                "Love you Melya!",
                "Melya juara 1!",
                "Hei Melya! 👋",
                "Semangat Melya!",
                "Mr. Bear peluk kamu",
                "Melya the best!"
            ];
            
            const bubble = document.getElementById('bearMsg');
            const bear = document.querySelector('.bear-avatar');
            
            // Ubah teks random
            bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            bubble.classList.add('show');
            
            // Animasi kaget
            bear.style.transform = "scale(1.2) rotate(10deg)";
            setTimeout(() => {
                bear.style.transform = "";
                setTimeout(() => {
                    bubble.classList.remove('show');
                }, 2000);
            }, 200);

            // Buat hati
            createHeart();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerText = ['💖', '💕', '💗', '🐻'][Math.floor(Math.random() * 4)];
            heart.className = 'heart-pop';
            
            // Posisi random di sekitar bear
            const rect = document.querySelector('.bear-avatar').getBoundingClientRect();
            const randomX = (Math.random() - 0.5) * 50;
            
            heart.style.left = (rect.left + rect.width/2 + randomX) + 'px';
            heart.style.top = rect.top + 'px';
            
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 1000);
        }

        // Klik sembarang ada hati kecil
        document.addEventListener('click', (e) => {
            if(e.target.closest('.mascot-container')) return; // Jangan double jika klik bear
            
            const h = document.createElement('div');
            h.innerText = "✨";
            h.className = 'heart-pop';
            h.style.left = e.clientX + 'px';
            h.style.top = e.clientY + 'px';
            h.style.fontSize = '1rem';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        });

    </script>
